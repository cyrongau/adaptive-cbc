# ----------------------------------------------------------
# adaptive-cbc.conf  –  Adaptive CBC Learning Platform
# ----------------------------------------------------------
# IMPORTANT: When using Docker service names as upstream targets
# (e.g. "backend", "frontend"), NGINX resolves the hostname once
# at startup using the Docker embedded DNS (127.0.0.11). If the
# target container is replaced/rebuilt, NGINX can cache a stale
# or IPv6 address.
#
# Permanent fix: declare all upstreams in explicit `upstream`
# blocks with `resolver 127.0.0.11 valid=10s ipv6=off` so that
# NGINX re-resolves hostnames every 10 s and *always* uses IPv4.
# ----------------------------------------------------------

# Docker's internal DNS resolver – always 127.0.0.11 inside a
# docker-compose bridge network.
resolver 127.0.0.11 valid=10s ipv6=off;

# Keep upstream references as variables inside location blocks.
# This forces NGINX to re-resolve via the resolver directive
# above on every request instead of caching at startup.
# Variables are set at the server level and used inside
# location blocks – this is the canonical NGINX pattern for
# dynamic DNS in containers.

server {
    listen 80;
    server_name localhost;

    # -------------------------------------------------------
    # Frontend  (Next.js dev server)
    # -------------------------------------------------------
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # -------------------------------------------------------
    # Backend API  (NestJS on port 3002)
    # -------------------------------------------------------
    location /api/ {
        set $backend_upstream http://backend:3002;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_pass_request_headers on;

        # Increase timeouts for long-running requests (e.g. OCR polling)
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # Static/uploaded files served by the backend
    location /uploads/ {
        set $backend_upstream http://backend:3002;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # AI Service  (Node.js on port 8002)
    # -------------------------------------------------------
    location /ai/ {
        set $ai_upstream http://ai-service:8002;
        proxy_pass $ai_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # -------------------------------------------------------
    # OCR Service  (Python FastAPI on port 8003)
    # -------------------------------------------------------
    location /ocr/ {
        set $ocr_upstream http://ocr-service:8003;
        proxy_pass $ocr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }
}