services:
  # PostgreSQL Database - Port 5434 (5432, 5433 taken)
  postgres:
    image: postgres:15-alpine
    container_name: adaptive-learning-postgres
    environment:
      POSTGRES_USER: cbc_user
      POSTGRES_PASSWORD: cbc_secure_pass_2024
      POSTGRES_DB: adaptive_cbc
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbc_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adaptive-network

  # Redis - Port 6381 (6379, 6380 taken)
  redis:
    image: redis:7-alpine
    container_name: adaptive-learning-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - adaptive-network

  # MinIO Object Storage - Port 9003 (9000, 9001, 9002 taken)
  minio:
    image: minio/minio:latest
    container_name: adaptive-learning-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9003:9000"
      - "9004:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - adaptive-network

  # Backend API - Port 3002 (3000, 3001 taken)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adaptive-learning-backend
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=cbc_user
      - DATABASE_PASSWORD=cbc_secure_pass_2024
      - DATABASE_NAME=adaptive_cbc
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - JWT_SECRET=cbc_jwt_secret_key_2024_adaptive
      - JWT_EXPIRES_IN=1d
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=adaptive-cbc-files
      - AI_SERVICE_URL=http://ai-service:8002
      - OCR_SERVICE_URL=http://ocr-service:8003
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - adaptive-network

  # Frontend - Port 3003 (3000, 3001 taken)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adaptive-learning-frontend
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8100
      - NEXT_PUBLIC_WS_URL=ws://localhost:8100
    ports:
      - "3003:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - adaptive-network

  # AI Service - Port 8002 (8001 from cbc-adapt)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: adaptive-learning-ai-service
    env_file:
      - ./ai-service/.env
    environment:
      - PORT=8002
    ports:
      - "8002:8002"
    volumes:
      - ./ai-service:/app
      - /app/node_modules
    networks:
      - adaptive-network

  # OCR Service - Port 8003 (Python FastAPI + Celery)
  ocr-service:
    build:
      context: ./services/ocr-service
      dockerfile: Dockerfile
    container_name: adaptive-learning-ocr-service
    environment:
      - PORT=8003
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=ocr-documents
      - MINIO_SECURE=false
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=google/gemini-2.0-flash-001
      - AI_SERVICE_URL=http://ai-service:8002
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/adaptive-cbc-ocr-vision-service-key-8cfdf75b4653.json
      - MAX_PAGES=30
      - OCR_DPI=300
    ports:
      - "8003:8003"
    volumes:
      - ./services/ocr-service:/app
      - ./backend/credentials:/app/credentials:ro
    networks:
      - adaptive-network

  # Nginx Reverse Proxy - Port 8100 (8101 from cbc-adapt)
  nginx:
    image: nginx:alpine
    container_name: adaptive-learning-nginx
    ports:
      - "8100:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - adaptive-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ocr_temp:

networks:
  adaptive-network:
    driver: bridge